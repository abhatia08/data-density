name: Release

on:
  push:
    tags:
      - "submission-*"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. submission-2026-06-15)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          if [[ "$TAG" == submission-* ]]; then
            TITLE="EDI first submission snapshot (${TAG#submission-})"
            NOTES_FILE=".github/release-notes/submission.md"
          else
            TITLE="Release ${TAG}"
            NOTES_FILE=".github/release-notes/semver.md"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TITLE" --notes-file "$NOTES_FILE"
